<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(
    135deg,
    #0f172a,
    #1e3a8a,
    #0f172a
    );

    overflow:hidden;
}

/* 🔥 Background Effects */

.circle1,
.circle2{

    position:absolute;

    border-radius:50%;

    filter:blur(120px);
}

.circle1{

    width:300px;
    height:300px;

    background:#3b82f6;

    top:-100px;
    left:-100px;
}

.circle2{

    width:300px;
    height:300px;

    background:#9333ea;

    bottom:-100px;
    right:-100px;
}

/* 🔐 Login Box */

.login-box{

    width:350px;

    padding:35px;

    border-radius:25px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.1);

    box-shadow:0 0 40px rgba(0,0,0,0.3);

    color:white;

    z-index:10;
}

/* 🔥 Heading */

.login-box h2{

    text-align:center;

    margin-bottom:25px;

    font-weight:600;
}

/* 📥 Inputs */

.input-box{

    margin-bottom:20px;
}

.input-box input{

    width:100%;

    padding:14px;

    border:none;

    border-radius:14px;

    outline:none;

    background:rgba(255,255,255,0.1);

    color:white;

    font-size:15px;
}

.input-box input::placeholder{

    color:#cbd5e1;
}

/* 🔘 Button */

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:14px;

    background:#3b82f6;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    background:#2563eb;

    transform:scale(1.03);
}

/* 📱 Mobile */

@media(max-width:500px){

    .login-box{

        width:90%;
    }

}

</style>

</head>

<body>

<div class="circle1"></div>
<div class="circle2"></div>

<div class="login-box">

    <h2>🔐 Login</h2>

    <form method="POST">

        <div class="input-box">

            <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        </div>

        <div class="input-box">

            <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        </div>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>

</html>
